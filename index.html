<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <title>Página Inicial</title>
</head>
<body>
    <div class="video-background">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="./video/tela_inicial.mp4" type="video/mp4">
            Seu navegador não suporta vídeos em HTML5.
        </video>
        <div class="overlay"></div>
    </div>

    <main class="menu-container">
        <img src="./img/logo.png" alt="Sombras do Oeste" class="game-logo">

        <div class="button-group">

            <!-- JOGAR -->
            <a href="./html/intro.html" class="btn-western btn-play">
                <span class="btn-icon">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <!-- Porta de saloon / portão estilo faroeste -->
                        <rect x="1" y="2" width="14" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="3" y="4" width="4" height="8" fill="currentColor" opacity="0.5"/>
                        <rect x="9" y="4" width="4" height="8" fill="currentColor" opacity="0.5"/>
                        <line x1="7" y1="4" x2="7" y2="12" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="9" y1="4" x2="9" y2="12" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="6" y="7" width="4" height="2" fill="currentColor"/>
                    </svg>
                </span>
                <span class="btn-arrows-left">▶</span>
                <span class="btn-label">Jogar</span>
                <span class="btn-arrows-right">▶▶</span>
        </a>

            <!-- COMO JOGAR -->
            <a href="./html/sobreJogo.html" class="btn-western btn-play">
                <span class="btn-icon">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <!-- Livro / pergaminho -->
                        <rect x="2" y="1" width="10" height="13" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <rect x="2" y="1" width="2" height="13" fill="currentColor" opacity="0.5"/>
                        <line x1="5" y1="4" x2="10" y2="4" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="5" y1="7" x2="10" y2="7" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="5" y1="10" x2="8"  y2="10" stroke="currentColor" stroke-width="1.5"/>
                        <!-- lápis/pena no canto -->
                        <line x1="11" y1="9" x2="14" y2="6" stroke="currentColor" stroke-width="1.5"/>
                        <polygon points="11,9 10,13 14,12" fill="currentColor"/>
                    </svg>
                </span>
                <span class="btn-label">Como Jogar</span>
            </a>
            <!-- SISTEMA DE MÚSICA -->
<a href="./html/musica.html" class="btn-western" id="btn_musica">                <span class="btn-icon">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <!-- Piano / acordeom pixel -->
                        <rect x="1" y="3" width="14" height="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <!-- teclas brancas -->
                        <line x1="4"  y1="3" x2="4"  y2="13" stroke="currentColor" stroke-width="1"/>
                        <line x1="7"  y1="3" x2="7"  y2="13" stroke="currentColor" stroke-width="1"/>
                        <line x1="10" y1="3" x2="10" y2="13" stroke="currentColor" stroke-width="1"/>
                        <line x1="13" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="1"/>
                        <!-- teclas pretas -->
                        <rect x="2.5" y="3" width="2" height="5" fill="currentColor"/>
                        <rect x="5.5" y="3" width="2" height="5" fill="currentColor"/>
                        <rect x="8.5" y="3" width="2" height="5" fill="currentColor"/>
                        <rect x="11.5" y="3" width="2" height="5" fill="currentColor"/>
                    </svg>
                </span>
                <span class="btn-label">Sistema de Música</span>
            </a>

            <!-- LOJINHA -->
            <button class="btn-western">
                <span class="btn-icon">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <!-- Caixote / barril de loja -->
                        <rect x="3" y="4" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="3" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="3" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.5"/>
                        <!-- tampa -->
                        <rect x="2" y="2" width="12" height="3" fill="currentColor"/>
                        <!-- símbolo $ -->
                        <text x="8" y="14" text-anchor="middle" font-size="5" font-family="monospace" fill="currentColor" font-weight="bold">$</text>
                    </svg>
                </span>
                <span class="btn-label">Lojinha</span>
            </button>

            <!-- SOBRE OS DESENVOLVEDORES -->
            <button class="btn-western">
                <span class="btn-icon">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <!-- Xerife / chapéu de cowboy -->
                        <!-- corpo -->
                        <ellipse cx="8" cy="7" rx="4" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <!-- chapéu -->
                        <rect x="5" y="2" width="6" height="3" fill="currentColor"/>
                        <rect x="3" y="4" width="10" height="1.5" fill="currentColor"/>
                        <!-- estrela de xerife -->
                        <polygon points="8,5 8.5,6.5 10,6.5 8.8,7.4 9.3,9 8,8 6.7,9 7.2,7.4 6,6.5 7.5,6.5" fill="currentColor"/>
                        <!-- base -->
                        <path d="M4 11 Q8 15 12 11" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="4" y1="11" x2="4" y2="14" stroke="currentColor" stroke-width="1.5"/>
                        <line x1="12" y1="11" x2="12" y2="14" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </span>
                <span class="btn-label">Sobre os Desenvolvedores</span>
            </button>

        </div>
    </main>
</body>
</html>
